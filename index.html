<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Artvane — прототип</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Artvane">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nsfwjs@4.2.1/dist/nsfwjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.2/dist/nsfwjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #0a0a0a;
    --surface: #141412;
    --surface-2: #1c1c19;
    --fg: #f2f0ea;
    --fg-dim: #8c8c86;
    --line: #2a2a26;
    --accent: #e6432a;
    --btn-text: #0a0a0a;
  }
  :root[data-theme="light"]{
    --bg: #ffffff;
    --surface: #f7f5f2;
    --surface-2: #efece6;
    --fg: #18140f;
    --fg-dim: #8a8479;
    --line: #e3ded5;
    --accent: #d8341c;
    --btn-text: #ffffff;
  }
  html{ transition: background .2s ease; }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent); color:var(--btn-text); }

  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 22px;
    background:rgba(10,10,10,0.88);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--line);
  }
  .wordmark{
    font-family:'Fraunces', serif; font-style:italic; font-weight:500;
    font-size:24px; letter-spacing:0.5px; color:var(--fg);
  }
  .wordmark span.dot{ color:var(--accent); font-style:normal; }
  nav.top-actions{ display:flex; align-items:center; gap:10px; }
  .icon-btn{
    background:var(--surface); border:1px solid var(--line); color:var(--fg-dim);
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color .2s ease, color .2s ease, box-shadow .2s ease, transform .15s ease;
    position:relative;
  }
  .icon-btn svg{ width:18px; height:18px; }
  .icon-btn:hover{
    color:var(--accent); border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(230,67,42,0.25), 0 0 14px rgba(230,67,42,0.35);
    transform:translateY(-1px);
  }
  .badge{
    position:absolute; top:-5px; right:-5px; background:var(--accent);
    color:#fff; font-size:10px; font-weight:700; border-radius:9px; padding:1px 5px;
    min-width:16px; text-align:center; line-height:14px;
    font-family:'IBM Plex Mono', monospace; display:none;
    box-shadow:0 0 8px rgba(230,67,42,0.7), 0 0 0 2px var(--bg);
  }
  .badge.show{ display:block; }
  .btn-primary{
    background:var(--fg); color:var(--btn-text); border:none;
    padding:8px 16px; border-radius:20px; font-weight:600; font-size:13px;
    cursor:pointer; transition:transform .15s ease, background .2s;
  }
  .btn-primary:hover{ transform:translateY(-1px); background:#fff; }
  .btn-primary:disabled{ opacity:0.5; cursor:default; transform:none; }
  .btn-ghost{
    background:none; color:var(--fg-dim); border:1px solid var(--line);
    padding:8px 14px; border-radius:20px; font-size:13px; cursor:pointer;
  }
  .btn-ghost:hover{ color:var(--fg); border-color:var(--fg-dim); }

  main{ max-width:520px; margin:0 auto; padding:26px 18px 100px; }
  .feed-header{ margin-bottom:20px; display:flex; align-items:baseline; justify-content:space-between; }
  .feed-header .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:2px;
    text-transform:uppercase; color:var(--accent);
  }
  .feed-header h1{ font-family:'Fraunces', serif; font-weight:400; font-size:28px; margin:4px 0 0; }
  .feed-mode-btn{
    display:flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--line); color:var(--fg-dim); padding:8px 14px;
    border-radius:20px; cursor:pointer; font-size:12.5px; font-family:'Inter', sans-serif;
    transition:border-color .2s ease, color .2s ease;
  }
  .feed-mode-btn:hover{ border-color:var(--fg-dim); color:var(--fg); }
  .feed-mode-btn.active{ border-color:var(--accent); color:var(--accent); }

  .privacy-toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    font-size:13.5px; color:var(--fg); margin-bottom:6px;
  }
  .privacy-switch{ position:relative; display:inline-block; width:42px; height:24px; flex-shrink:0; }
  .privacy-switch input{ opacity:0; width:0; height:0; }
  .privacy-switch-slider{
    position:absolute; inset:0; background:var(--line); border-radius:24px; cursor:pointer;
    transition:background .2s ease;
  }
  .privacy-switch-slider::before{
    content:''; position:absolute; width:18px; height:18px; left:3px; top:3px;
    background:var(--fg); border-radius:50%; transition:transform .2s ease;
  }
  .privacy-switch input:checked + .privacy-switch-slider{ background:var(--accent); }
  .privacy-switch input:checked + .privacy-switch-slider::before{ transform:translateX(18px); background:#fff; }

  .grid{ display:flex; flex-direction:column; gap:20px; }

  .frame{
    background:var(--surface); border:1px solid var(--line); border-radius:20px;
    overflow:hidden; position:relative;
  }
  .frame-header{
    display:flex; align-items:center; gap:9px;
    padding:10px 12px; border-bottom:1px solid var(--line);
  }
  .avatar-badge{
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    background:var(--surface-2); border:1px solid var(--line); color:var(--fg);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:600; font-size:13px;
    cursor:pointer; padding:0; overflow:hidden;
  }
  .avatar-badge.avatar-lg{ width:64px; height:64px; font-size:26px; }
  .avatar-wrap{ position:relative; flex-shrink:0; }
  .avatar-edit-btn{
    position:absolute; bottom:-2px; right:-2px; width:24px; height:24px; border-radius:50%;
    background:var(--accent); color:#fff; border:2px solid var(--surface);
    display:none; align-items:center; justify-content:center; font-size:11px;
    cursor:pointer;
  }
  .avatar-edit-btn.show{ display:flex; }
  .author-link{
    background:none; border:none; color:var(--fg); font-weight:600; font-size:13px;
    cursor:pointer; padding:0; font-family:'Inter', sans-serif;
  }
  .author-link:hover{ text-decoration:underline; }
  .frame-date{ margin-left:auto; font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--fg-dim); }
  .post-menu-btn{
    background:none; border:none; color:var(--fg-dim); cursor:pointer; font-size:12px;
    padding:2px 4px; margin-left:6px;
  }
  .post-menu-btn:hover{ color:var(--accent); }

  @keyframes develop{
    0%{ filter: blur(16px) grayscale(1) brightness(0.35) contrast(1.3); }
    60%{ filter: blur(4px) grayscale(0.5) brightness(0.8) contrast(1.1); }
    100%{ filter: blur(0) grayscale(0) brightness(1) contrast(1); }
  }
  .frame img.developing{ animation: develop 1.6s ease-out; }
  .frame img, .frame video{
    display:block; width:100%; height:auto; max-height:520px; object-fit:cover;
    background:#000;
  }
  .frame-info{ padding:11px 13px 6px; }
  .frame-info .cap{ font-size:13.5px; color:var(--fg); line-height:1.4; margin:0 0 4px; }
  .frame-info .author{ font-size:11.5px; color:var(--fg-dim); margin:0; }
  .frame-actions{ display:flex; align-items:center; gap:16px; padding:6px 13px 13px; }
  .action{
    display:flex; align-items:center; gap:6px; background:none; border:none;
    color:var(--fg-dim); cursor:pointer; font-family:'IBM Plex Mono', monospace; font-size:12px;
  }
  .action:hover{ color:var(--fg); }
  .action.liked{ color:var(--accent); }
  .action.reposted{ color:var(--accent); }
  .mark-wrap{ position:relative; width:19px; height:19px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .mark-wrap svg{ position:absolute; inset:0; overflow:hidden; }
  .heart-path{
    fill:none; stroke:var(--fg-dim); stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round;
    transition: fill .2s ease, stroke .2s ease;
  }
  .liked .heart-path{ fill:var(--accent); stroke:var(--accent); }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--fg-dim);
    font-family:'IBM Plex Mono', monospace; font-size:13px; border:1px dashed var(--line); border-radius:2px;
  }

  .profile-header{ display:flex; align-items:center; gap:16px; margin-bottom:16px; }
  .profile-header-info{ flex:1; min-width:0; }
  .profile-header-info h2{ margin:0 0 4px; font-size:20px; }
  .profile-name-row{ display:flex; align-items:center; gap:8px; }
  .profile-login{ color:var(--fg-dim); font-size:12px; margin:0 0 4px; font-family:'IBM Plex Mono', monospace; }
  .profile-stat{ color:var(--fg-dim); font-size:13px; margin:0; }
  .inline-edit-btn{
    background:none; border:none; color:var(--fg-dim); cursor:pointer; font-size:13px; padding:0;
  }
  .inline-edit-btn:hover{ color:var(--accent); }
  .inline-edit-input{
    width:100%; background:var(--surface-2); border:1px solid var(--line);
    color:var(--fg); padding:10px 12px; border-radius:8px; font-size:16px;
    font-family:'Inter', sans-serif; margin-bottom:6px; resize:vertical;
  }
  .inline-edit-input:focus{ outline:none; border-color:var(--accent); }
  .inline-edit-actions{ display:flex; gap:8px; margin-bottom:6px; }
  .profile-actions{ margin-bottom:18px; }
  .profile-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; }
  .profile-grid img, .profile-grid video{
    width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:6px; cursor:pointer;
    background:var(--surface-2);
  }

  /* ---------- Overlay / Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,10,10,0.72); backdrop-filter: blur(3px);
    display:none; align-items:center; justify-content:center; z-index:100; padding:16px;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--surface); border:1px solid var(--line); width:100%; max-width:400px;
    padding:28px 24px 24px; border-radius:18px; position:relative; max-height:86vh; overflow-y:auto;
  }
  .modal .close{
    position:absolute; top:14px; right:16px; background:none; border:none;
    color:var(--fg-dim); font-size:18px; cursor:pointer; font-family:'IBM Plex Mono', monospace;
  }
  .modal .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:2px;
    text-transform:uppercase; color:var(--accent); display:block; margin-bottom:8px;
  }
  .modal h2{ font-family:'Fraunces', serif; font-weight:400; font-size:24px; margin:0 0 18px; }
  .field{ margin-bottom:13px; }
  .field label{
    display:block; font-size:11px; color:var(--fg-dim); margin-bottom:6px;
    font-family:'IBM Plex Mono', monospace; letter-spacing:0.5px;
  }
  .field input, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--line);
    color:var(--fg); padding:12px 14px; border-radius:10px; font-size:16px;
    font-family:'Inter', sans-serif; resize:vertical;
  }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--fg-dim); }
  input, textarea{ font-size:16px; }

  .drop-zone{
    position:relative; width:100%; min-height:180px; border-radius:16px;
    border:1.5px dashed var(--line); background:var(--surface-2);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; cursor:pointer; transition:border-color .2s ease, background .2s ease;
    overflow:hidden; text-align:center; padding:20px;
  }
  .drop-zone:hover, .drop-zone.dragover{ border-color:var(--accent); background:#1a1310; }
  .drop-zone input[type="file"]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-zone-icon{ color:var(--fg-dim); }
  .drop-zone.dragover .drop-zone-icon,
  .drop-zone.dragover .drop-zone-title{ color:var(--accent); }
  .drop-zone-title{ font-size:14px; color:var(--fg); font-weight:500; }
  .drop-zone-sub{ font-size:11.5px; color:var(--fg-dim); font-family:'IBM Plex Mono', monospace; }
  .drop-zone-preview{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;
  }
  .drop-zone.has-image .drop-zone-preview{ display:block; }
  .drop-zone.has-image .drop-zone-icon,
  .drop-zone.has-image .drop-zone-title,
  .drop-zone.has-image .drop-zone-sub{ display:none; }
  .drop-zone-remove{
    position:absolute; top:10px; right:10px; background:rgba(10,10,10,0.7);
    color:#fff; border:none; width:28px; height:28px; border-radius:50%;
    cursor:pointer; display:none; align-items:center; justify-content:center; font-size:14px; z-index:2;
  }
  .drop-zone.has-image .drop-zone-remove{ display:flex; }
  .field-error{ color:var(--accent); font-size:11.5px; margin-top:5px; display:none; }
  .field-error.show{ display:block; }
  .modal .btn-primary{ width:100%; padding:11px; margin-top:6px; font-size:14px; }
  .switch-line{ text-align:center; margin-top:14px; font-size:13px; color:var(--fg-dim); }
  .switch-line button{
    background:none; border:none; color:var(--fg); text-decoration:underline;
    cursor:pointer; font-size:13px; font-family:'Inter', sans-serif; padding:0;
  }

  /* ---------- DM ---------- */
  .user-list{ display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; }
  .user-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; background:var(--surface-2); border:1px solid var(--line); border-radius:2px;
    cursor:pointer; font-size:13.5px;
  }
  .user-row:hover{ border-color:var(--fg-dim); }
  .user-row .unread-dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); display:none; }
  .user-row.has-unread .unread-dot{ display:block; }
  .row-btn{
    background:none; border:1px solid var(--line); color:var(--fg-dim);
    padding:5px 10px; border-radius:14px; font-size:11.5px; cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .row-btn:hover{ color:var(--fg); border-color:var(--fg-dim); }
  .row-btn.accent{ background:var(--fg); color:var(--btn-text); border:none; }
  .row-btn:disabled{ opacity:0.5; cursor:default; }

  .chat-modal .modal{ display:flex; flex-direction:column; height:70vh; max-height:560px; padding:0; }
  .chat-head{
    display:flex; align-items:center; gap:10px; padding:16px 18px;
    border-bottom:1px solid var(--line); font-family:'IBM Plex Mono', monospace; font-size:13px;
  }
  .chat-back{ background:none; border:none; color:var(--fg-dim); cursor:pointer; font-size:16px; }
  .chat-messages{ flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:9px; }
  .msg{ max-width:78%; padding:9px 12px; border-radius:12px; font-size:13.5px; line-height:1.4; }
  .msg.mine{ align-self:flex-end; background:var(--fg); color:var(--btn-text); border-bottom-right-radius:3px; }
  .msg.theirs{ align-self:flex-start; background:var(--surface-2); border:1px solid var(--line); border-bottom-left-radius:3px; }
  .msg-time{ font-size:9.5px; opacity:0.6; margin-top:3px; font-family:'IBM Plex Mono', monospace; }
  .chat-input-row{
    display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--line);
  }
  .chat-input-row input{
    flex:1; background:var(--surface-2); border:1px solid var(--line); color:var(--fg);
    padding:11px 14px; border-radius:20px; font-size:16px; font-family:'Inter', sans-serif;
  }
  .chat-input-row input:focus{ outline:none; border-color:var(--fg-dim); }
  .chat-send{
    background:var(--fg); color:var(--btn-text); border:none; border-radius:50%;
    width:38px; height:38px; cursor:pointer; font-size:15px; flex-shrink:0;
  }
  .chat-send:disabled{ opacity:0.4; }
  .emoji-toggle-btn{
    background:none; border:none; font-size:20px; cursor:pointer; flex-shrink:0;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
  }
  .emoji-panel{
    display:none; grid-template-columns:repeat(8, 1fr); gap:4px;
    padding:10px 14px; border-top:1px solid var(--line); max-height:160px; overflow-y:auto;
  }
  .emoji-panel.open{ display:grid; }
  .emoji-panel button{
    background:none; border:none; font-size:21px; cursor:pointer; padding:6px 0;
    border-radius:8px; transition:background .15s ease;
  }
  .emoji-panel button:hover{ background:var(--surface-2); }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--fg); color:var(--btn-text); padding:11px 18px; border-radius:20px;
    font-size:13px; font-weight:600; opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; z-index:200; max-width:90vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .swipe-stack{
    position:relative; width:100%; height:420px; margin-bottom:16px;
  }
  .swipe-card{
    position:absolute; inset:0; background:var(--surface); border:1px solid var(--line);
    border-radius:20px; overflow:hidden; cursor:grab; user-select:none;
    display:flex; flex-direction:column;
  }
  .swipe-card:active{ cursor:grabbing; }
  .swipe-card img, .swipe-card video{ width:100%; flex:1; object-fit:cover; pointer-events:none; }
  .swipe-caption{ padding:12px 14px; }
  .swipe-caption strong{ font-size:13.5px; }
  .swipe-caption p{ margin:2px 0 0; font-size:12.5px; color:var(--fg-dim); }
  .swipe-stamp{
    position:absolute; top:20px; padding:6px 14px; border:3px solid; border-radius:8px;
    font-weight:700; font-size:18px; letter-spacing:1px; opacity:0; pointer-events:none;
    font-family:'IBM Plex Mono', monospace; text-transform:uppercase;
  }
  .swipe-like{ left:16px; color:#4ade80; border-color:#4ade80; transform:rotate(-12deg); }
  .swipe-nope{ right:16px; color:var(--accent); border-color:var(--accent); transform:rotate(12deg); }
  .swipe-controls{ display:flex; justify-content:center; gap:24px; }
  .swipe-ctrl-btn{
    width:52px; height:52px; border-radius:50%; border:1px solid var(--line);
    background:var(--surface); color:var(--fg-dim); font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:transform .15s ease, border-color .2s ease;
  }
  .swipe-ctrl-btn:hover{ transform:translateY(-2px); }
  .swipe-ctrl-btn.nope:hover{ color:var(--accent); border-color:var(--accent); }
  .swipe-ctrl-btn.like:hover{ color:#4ade80; border-color:#4ade80; }

  .search-panel{
    position:fixed; top:66px; right:16px; width:min(320px, calc(100vw - 32px));
    max-height:60vh; overflow-y:auto; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:14px; z-index:60; display:none;
    box-shadow:0 14px 34px rgba(0,0,0,0.55);
  }
  .search-panel.open{ display:block; }
  .search-panel-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
  }
  .search-input-wrap{ position:relative; }
  .search-input-wrap input{ padding-right:36px; }
  .search-clear-btn{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:var(--line); color:var(--fg-dim); border:none; width:22px; height:22px;
    border-radius:50%; font-size:11px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }
  .search-clear-btn:hover{ color:var(--fg); }
  .password-toggle-btn{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--fg-dim); cursor:pointer;
    font-size:15px; width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    opacity:0.7;
  }
  .password-toggle-btn:hover{ opacity:1; }

  .spinner{
    display:inline-block; width:14px; height:14px; border:2px solid var(--fg-dim);
    border-top-color:var(--fg); border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  footer{
    text-align:center; padding:24px; color:var(--fg-dim); font-size:11.5px;

<script>
/* ===================== Supabase setup ===================== */
const SUPABASE_URL = 'https://lnnflsqyalgqykmqyqfl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jcAEoHzol11uJRURyJ6V5g_1DqOWs9u';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== State ===================== */
let currentUser = null; // {username}
let postsCache = [];
let dmWithUser = null;
let feedPollTimer = null;

const $ = (id) => document.getElementById(id);

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}

function openOverlay(id){ $(id).classList.add('open'); }
function closeOverlay(id){ $(id).classList.remove('open'); }

function showPrompt(title, initialValue){
  $('promptTitle').textContent = title;
  $('promptInput').value = initialValue || '';
  openOverlay('promptOverlay');
  return new Promise((resolve) => {
    const saveBtn = $('promptSaveBtn');
    const cancelBtn = $('promptCancelBtn');
    function cleanup(result){
      closeOverlay('promptOverlay');
      saveBtn.removeEventListener('click', onSave);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onSave(){ cleanup($('promptInput').value); }
    function onCancel(){ cleanup(null); }
    saveBtn.addEventListener('click', onSave);
    cancelBtn.addEventListener('click', onCancel);
    $('promptInput').focus();
  });
}

function showConfirm(message, okLabel){
  $('confirmMessage').textContent = message;
  $('confirmOkBtn').textContent = okLabel || 'Удалить';
  openOverlay('confirmOverlay');
  return new Promise((resolve) => {
    const okBtn = $('confirmOkBtn');
    const cancelBtn = $('confirmCancelBtn');
    function cleanup(result){
      closeOverlay('confirmOverlay');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onOk(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeOverlay(btn.dataset.close));
});
[ 'authOverlay','postOverlay','dmListOverlay','friendsOverlay','profileOverlay','commentsOverlay','swipeOverlay','promptOverlay','settingsOverlay' ].forEach(id => {
  $(id).addEventListener('click', (e) => { if(e.target.id === id) closeOverlay(id); });
});

/* ===================== Users ===================== */
async function findUser(username){
  const { data, error } = await sb.from('users').select('*').eq('username', username).maybeSingle();
  if(error){ console.error(error); return null; }
  return data;
}
async function createUser(username, password, displayName){
  const { error } = await sb.from('users').insert({ username, password, display_name: displayName });
  return !error;
}
async function listOtherUsers(excludeUsername){
  const { data, error } = await sb.from('users').select('username').neq('username', excludeUsername);
  if(error){ console.error(error); return []; }
  return data.map(u => u.username);
}

/* ===================== Avatars, bio & display names ===================== */
let avatarsByUsername = {};
let bioByUsername = {};
let displayNameByUsername = {};
let isPrivateByUsername = {};
async function loadAvatarsForUsers(usernames){
  const unique = [...new Set(usernames)].filter(u => avatarsByUsername[u] === undefined);
  if(unique.length === 0) return;
  const { data, error } = await sb.from('users').select('username, avatar_url, bio, display_name, is_private').in('username', unique);
  if(error){ console.error(error); return; }
  data.forEach(u => {
    avatarsByUsername[u.username] = u.avatar_url;
    bioByUsername[u.username] = u.bio;
    displayNameByUsername[u.username] = u.display_name;
    isPrivateByUsername[u.username] = !!u.is_private;
  });
}
async function getAvatarUrl(username){
  if(avatarsByUsername[username] !== undefined) return avatarsByUsername[username];
  const { data } = await sb.from('users').select('avatar_url, bio, display_name, is_private').eq('username', username).maybeSingle();
  const url = data ? data.avatar_url : null;
  avatarsByUsername[username] = url;
  bioByUsername[username] = data ? data.bio : null;
  displayNameByUsername[username] = data ? data.display_name : null;
  isPrivateByUsername[username] = data ? !!data.is_private : false;
  return url;
}
function avatarInnerHtml(username){
  const url = avatarsByUsername[username];
  if(url) return `<img src="${url}" style="width:100%;height:100%;object-fit:cover;" alt="">`;
  return escapeHtml((displayNameFor(username)).charAt(0).toUpperCase());
}
function displayNameFor(username){
  return displayNameByUsername[username] || username;
}

/* ===================== Posts ===================== */
async function loadPosts(){
  const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
  if(error){ console.error(error); postsCache = []; return postsCache; }
  postsCache = data.map(p => ({
    id: p.id, img: p.img, cap: p.cap, author: p.author,
    mediaType: p.media_type || 'image',
    ts: new Date(p.created_at).getTime(),
    likedBy: p.liked_by || [], repostedBy: p.reposted_by || []
  }));
  return postsCache;
}
async function insertPost(author, img, cap, mediaType){
  const { error } = await sb.from('posts').insert({ author, img, cap, media_type: mediaType || 'image', liked_by: [], reposted_by: [] });
  return !error;
}
async function updatePostReactions(id, likedBy, repostedBy){
  const { error } = await sb.from('posts').update({ liked_by: likedBy, reposted_by: repostedBy }).eq('id', id);
  return !error;
}
async function updatePostCaption(id, cap){
  const { error } = await sb.from('posts').update({ cap }).eq('id', id);
  return !error;
}
function extractStoragePath(url, bucket){
  if(!url) return null;
  const marker = `/storage/v1/object/public/${bucket}/`;
  const idx = url.indexOf(marker);
  if(idx === -1) return null;
  return decodeURIComponent(url.slice(idx + marker.length));
}
async function deletePostById(post){
  const path = extractStoragePath(post.img, 'post-images');
  if(path){
    const { error: storageError } = await sb.storage.from('post-images').remove([path]);
    if(storageError) console.error('Не удалось удалить файл из хранилища', storageError);
  }
  const { error } = await sb.from('posts').delete().eq('id', post.id);
  return !error;
}

/* ===================== Comments ===================== */
let commentCountsByPost = {};
async function loadCommentCounts(postIds){
  if(postIds.length === 0) return;
  const { data, error } = await sb.from('comments').select('post_id').in('post_id', postIds);
  if(error){ console.error(error); return; }
  commentCountsByPost = {};
  data.forEach(c => { commentCountsByPost[c.post_id] = (commentCountsByPost[c.post_id] || 0) + 1; });
}
async function fetchComments(postId){
  const { data, error } = await sb.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
  if(error){ console.error(error); return []; }
  return data;
}
async function insertComment(postId, author, text){
  const { error } = await sb.from('comments').insert({ post_id: postId, author, text });
  return !error;
}

/* ===================== Messages ===================== */
async function loadThread(a, b){
  const { data, error } = await sb.from('messages')
    .select('*')
    .or(`and(from_user.eq.${a},to_user.eq.${b}),and(from_user.eq.${b},to_user.eq.${a})`)
    .order('created_at', { ascending: true });
  if(error){ console.error(error); return []; }
  return data.map(m => ({ from: m.from_user, text: m.text, ts: new Date(m.created_at).getTime() }));
}
async function sendMessage(from, to, text){
  const { error } = await sb.from('messages').insert({ from_user: from, to_user: to, text });
  return !error;
}
async function countUnreadMessages(username){
  const { count, error } = await sb.from('messages').select('id', { count: 'exact', head: true }).eq('to_user', username).eq('read', false);
  if(error){ console.error(error); return 0; }
  return count || 0;
}
async function markConversationRead(me, other){
  await sb.from('messages').update({ read: true }).eq('to_user', me).eq('from_user', other).eq('read', false);
}
async function listConversations(username){
  const { data, error } = await sb.from('messages')
    .select('*')
    .or(`from_user.eq.${username},to_user.eq.${username}`)
    .order('created_at', { ascending: false });
  if(error){ console.error(error); return []; }
  const seen = new Map();
  data.forEach(m => {
    const other = m.from_user === username ? m.to_user : m.from_user;
    if(!seen.has(other)) seen.set(other, m);
  });
  return Array.from(seen.entries()).map(([user, lastMsg]) => ({ user, lastMsg }));
}

/* ===================== Friends ===================== */
async function sendFriendRequest(from, to){
  const { error } = await sb.from('friends').insert({ requester: from, recipient: to, status: 'pending' });
  return !error;
}
async function respondFriendRequest(id, status){
  const { error } = await sb.from('friends').update({ status }).eq('id', id);
  return !error;
}
async function getFriendStatus(username, otherUsername){
  const { data, error } = await sb.from('friends')
    .select('*')
    .or(`and(requester.eq.${username},recipient.eq.${otherUsername}),and(requester.eq.${otherUsername},recipient.eq.${username})`)
    .maybeSingle();
  if(error) return null;
  return data;
}
async function listPendingRequests(username){
  const { data, error } = await sb.from('friends').select('*').eq('recipient', username).eq('status', 'pending');
  if(error){ console.error(error); return []; }
  return data;
}
async function listFriends(username){
  const { data, error } = await sb.from('friends')
    .select('*')
    .or(`requester.eq.${username},recipient.eq.${username}`)
    .eq('status', 'accepted');
  if(error){ console.error(error); return []; }
  return data.map(f => f.requester === username ? f.recipient : f.requester);
}
async function removeFriendship(username, otherUsername){
  const { error } = await sb.from('friends')
    .delete()
    .or(`and(requester.eq.${username},recipient.eq.${otherUsername}),and(requester.eq.${otherUsername},recipient.eq.${username})`);
  return !error;
}
async function blockUser(me, them){
  await removeFriendship(me, them);
  const { error } = await sb.from('friends').insert({ requester: me, recipient: them, status: 'blocked' });
  return !error;
}
async function unblockUser(me, them){
  const { error } = await sb.from('friends').delete().eq('requester', me).eq('recipient', them).eq('status', 'blocked');
  return !error;
}
async function isBlockedByMe(me, them){
  const { data } = await sb.from('friends').select('*').eq('requester', me).eq('recipient', them).eq('status', 'blocked').maybeSingle();
  return !!data;
}
async function isBlockedEitherWay(me, them){
  const { data } = await sb.from('friends')
    .select('*')
    .or(`and(requester.eq.${me},recipient.eq.${them}),and(requester.eq.${them},recipient.eq.${me})`)
    .eq('status', 'blocked')
    .maybeSingle();
  return !!data;
}
async function listBlockedUsers(username){
  const { data, error } = await sb.from('friends').select('*').eq('requester', username).eq('status', 'blocked');
  if(error){ console.error(error); return []; }
  return data.map(f => f.recipient);
}

/* ===================== Moderation ===================== */
const BANNED_WORDS = [
  'хуй','хуе','пизд','ебат','ебал','ебан','сука','блять','бляд','мудак','долбоёб','долбоеб',
  'fuck','shit','bitch','asshole','nigger','faggot'
];
function containsBannedWords(text){
  const normalized = text.toLowerCase().replace(/[^а-яa-z]/gi, '');
  return BANNED_WORDS.some(w => normalized.includes(w));
}

let nsfwModel = null;
async function getNsfwModel(){
  if(nsfwModel) return nsfwModel;
  try{
    nsfwModel = await nsfwjs.load();
  }catch(e){
    console.error('NSFW model failed to load', e);
    nsfwModel = null;
  }
  return nsfwModel;
}
async function isImageSafe(file){
  const model = await getNsfwModel();
  if(!model) return true; // fail open if model can't load, don't block posting entirely
  const imgEl = await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
  const predictions = await model.classify(imgEl);
  URL.revokeObjectURL(imgEl.src);
  const bad = predictions.find(p => (p.className === 'Porn' || p.className === 'Hentai' || p.className === 'Sexy') && p.probability > 0.75);
  return !bad;
}

let lastDevelopedPostId = null;
function renderFeed(){
  const grid = $('grid');
  const allSorted = [...postsCache].sort((a,b) => b.ts - a.ts);
  let sorted = allSorted.filter(p => !blockedUsernames.has(p.author));
  if(currentUser){
    if(feedMode === 'home'){
      sorted = sorted.filter(p => p.author === currentUser.username || myFriendsSet.has(p.author));
    } else {
      sorted = sorted.filter(p => p.author === currentUser.username || myFriendsSet.has(p.author) || !isPrivateByUsername[p.author]);
    }
  } else {
    sorted = sorted.filter(p => !isPrivateByUsername[p.author]);
  }
  if(sorted.length === 0){
    const msg = feedMode === 'home'
      ? 'Пока нет публикаций от вас и друзей.<br>Загляните в «Мир» 🌍, чтобы увидеть всех.'
      : 'Пока нет публикаций.';
    grid.innerHTML = `<div class="empty-state">${currentUser ? msg : 'Пока нет ни одного поста.<br>Войдите и добавьте первый кадр.'}</div>`;
    return;
  }
  const topPostId = sorted[0].id;
  const isFirstRenderOfThisTop = topPostId !== lastDevelopedPostId;
  lastDevelopedPostId = topPostId;
  grid.innerHTML = sorted.map((p, sortedIdx) => {
    const idx = postsCache.indexOf(p);
    const liked = currentUser && p.likedBy && p.likedBy.includes(currentUser.username);
    const reposted = currentUser && p.repostedBy && p.repostedBy.includes(currentUser.username);
    const canManage = currentUser && (p.author === currentUser.username || currentUser.isAdmin);
    const commentCount = commentCountsByPost[p.id] || 0;
    const imgClass = (sortedIdx === 0 && isFirstRenderOfThisTop && p.mediaType !== 'video') ? 'developing' : '';
    const mediaHtml = p.mediaType === 'video'
      ? `<video src="${p.img}" controls playsinline preload="metadata"></video>`
      : `<img class="${imgClass}" src="${p.img}" loading="lazy" alt="${p.cap}" onerror="this.style.display='none'">`;
    return `
      <div class="frame">
        <div class="frame-header">
          <button class="avatar-badge" data-profile="${p.author}">${avatarInnerHtml(p.author)}</button>
          <button class="author-link" data-profile="${p.author}">${escapeHtml(displayNameFor(p.author))}</button>
          <span class="frame-date">${new Date(p.ts).toLocaleDateString('ru-RU')}</span>
          ${canManage ? `
            <button class="post-menu-btn" data-edit="${p.id}" title="Изменить описание">✎</button>
            <button class="post-menu-btn" data-delete="${p.id}" title="Удалить">🗑</button>
          ` : ''}
        </div>
        ${mediaHtml}
        ${p.cap ? `<div class="frame-info"><p class="cap">${escapeHtml(p.cap)}</p></div>` : ''}
        <div class="frame-actions">
          <button class="action like-btn ${liked ? 'liked' : ''}" data-idx="${idx}">
            <span class="mark-wrap">
              <svg viewBox="-1.5 -1.5 27 27"><path class="heart-path" d="M12 20.5s-7.5-4.6-10-9.3C0.3 7.8 2 4 5.8 4c2.1 0 3.7 1.2 4.7 2.7C11.5 5.2 13.1 4 15.2 4 19 4 20.7 7.8 19 11.2c-2.5 4.7-10 9.3-10 9.3z"/></svg>
            </span>
            <span>${(p.likedBy||[]).length}</span>
          </button>
          <button class="action repost-btn ${reposted ? 'reposted' : ''}" data-idx="${idx}">
            <svg class="repost-icon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 2.5 20.5 6 17 9.5"/>

              <path d="M7 21.5 3.5 18 7 14.5"/>

            </svg>
            <span>${(p.repostedBy||[]).length}</span>

          <button class="action comment-btn" data-post-id="${p.id}">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.4 8.4 0 0 1-8.9 8.4 8.7 8.7 0 0 1-3.4-.7L3 20l1-4.4A8.4 8.4 0 1 1 21 11.5Z"/>
            </svg>

  div.textContent = str;

$('grid').addEventListener('click', async (e) => {

  const commentBtn = e.target.closest('.comment-btn');
  const profileBtn = e.target.closest('[data-profile]');

  const deleteBtn = e.target.closest('[data-delete]');

  if(profileBtn){
    if(!currentUser){ showToast('Войдите, чтобы смотреть профили'); return; }
    openProfileModal(profileBtn.dataset.profile);
    return;
  }
  if(!currentUser && (likeBtn || repostBtn || commentBtn || editBtn || deleteBtn)){
    showToast('Войдите, чтобы взаимодействовать с постами');
    return;
  }
  if(likeBtn){
    const idx = +likeBtn.dataset.idx;
    const post = postsCache[idx];
    post.likedBy = post.likedBy || [];
    const pos = post.likedBy.indexOf(currentUser.username);
    if(pos === -1) post.likedBy.push(currentUser.username);
    else post.likedBy.splice(pos, 1);
    renderFeed();
    lastFeedSignature = computeFeedSignature(postsCache);
    await updatePostReactions(post.id, post.likedBy, post.repostedBy);
  }
  if(repostBtn){
    const idx = +repostBtn.dataset.idx;
    const post = postsCache[idx];
    post.repostedBy = post.repostedBy || [];
    const pos = post.repostedBy.indexOf(currentUser.username);
    if(pos === -1){ post.repostedBy.push(currentUser.username); showToast('Репост опубликован'); }
    else post.repostedBy.splice(pos, 1);
    renderFeed();
    lastFeedSignature = computeFeedSignature(postsCache);
    await updatePostReactions(post.id, post.likedBy, post.repostedBy);
  }
  if(commentBtn){
    openComments(commentBtn.dataset.postId);
  }
  if(editBtn){
    const postId = editBtn.dataset.edit;
    const post = postsCache.find(p => String(p.id) === String(postId));
    if(!post) return;
    const newCap = await showPrompt('Изменить описание', post.cap);
    if(newCap !== null){
      const trimmed = newCap.trim();
      if(containsBannedWords(trimmed)){ showToast('В описании есть недопустимые слова'); return; }
      post.cap = trimmed;
      renderFeed();
      lastFeedSignature = computeFeedSignature(postsCache);
      await updatePostCaption(postId, post.cap);
    }
  }
  if(deleteBtn){
    const postId = deleteBtn.dataset.delete;
    const post = postsCache.find(p => String(p.id) === String(postId));
    if(!post) return;
    const ok = await showConfirm('Удалить публикацию? Это нельзя отменить, файл тоже удалится с сервера.', 'Удалить');
    if(ok){
      await deletePostById(post);
      await loadPosts();
      lastFeedSignature = computeFeedSignature(postsCache);
      renderFeed();
      showToast('Публикация и файл удалены');
    }
  }
});

  const originalText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const existing = await findUser(username);

  if(authMode === 'signup'){
    if(existing){
      errEl.textContent = 'Этот логин уже занят';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = originalText;
      return;
    }
    const displayName = $('authDisplayName').value.trim() || username;
    const ok = await createUser(username, password, displayName);
    if(!ok){
      errEl.textContent = 'Не получилось сохранить, попробуйте ещё раз';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = originalText;
      return;
    }
    currentUser = { username, isAdmin: false };
    displayNameByUsername[username] = displayName;
    showToast(`Аккаунт создан — добро пожаловать, ${displayName}`);
  } else {
    if(!existing || existing.password !== password){
      errEl.textContent = 'Неверное имя или пароль';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = originalText;
      return;
    }
    currentUser = { username, isAdmin: !!existing.is_admin };
    showToast('Вход выполнен');
  }

  btn.disabled = false; btn.textContent = originalText;
  closeOverlay('authOverlay');
  $('authUsername').value = '';
  $('authPassword').value = '';
  $('authDisplayName').value = '';
  localStorage.setItem('artvane_username', currentUser.username);
  renderTopBar();
  await refreshMyFriendsSet();
  await refreshBlockedSet();
  renderFeed();
  refreshBadges();
});

/* ===================== New post ===================== */
const dropZone = $('dropZone');
const postImgFileInput = $('postImgFile');
const dropZonePreview = $('dropZonePreview');
const dropZoneVideoPreview = $('dropZoneVideoPreview');

function setDropZoneFile(file){
  if(!file) return;
  const dt = new DataTransfer();
  dt.items.add(file);
  postImgFileInput.files = dt.files;
  const isVideo = file.type.startsWith('video/');
  const url = URL.createObjectURL(file);
  if(isVideo){
    dropZonePreview.style.display = 'none';
    dropZonePreview.src = '';
    dropZoneVideoPreview.style.display = 'block';
    dropZoneVideoPreview.src = url;
  } else {
    dropZoneVideoPreview.style.display = 'none';
    dropZoneVideoPreview.src = '';
    dropZonePreview.style.display = 'block';
    dropZonePreview.src = url;
  }
  dropZone.classList.add('has-image');
}
function clearDropZoneFile(){
  postImgFileInput.value = '';
  dropZonePreview.src = '';
  dropZonePreview.style.display = 'none';
  dropZoneVideoPreview.src = '';
  dropZoneVideoPreview.style.display = 'none';
  dropZone.classList.remove('has-image');
}

postImgFileInput.addEventListener('change', () => {
  const file = postImgFileInput.files[0];
  if(file) setDropZoneFile(file);
});
['dragover','dragenter'].forEach(evt => {
  dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
});
['dragleave','dragend'].forEach(evt => {
  dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
});
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if(file && (file.type.startsWith('image/') || file.type.startsWith('video/'))) setDropZoneFile(file);
});
$('dropZoneRemove').addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  clearDropZoneFile();
});

$('postSubmit').addEventListener('click', async () => {
  const fileInput = $('postImgFile');
  const file = fileInput.files[0];
  const cap = $('postCap').value.trim();
  const errEl = $('postError');
  errEl.classList.remove('show');

  if(!file){
    errEl.textContent = 'Выберите фото или видео';
    errEl.classList.add('show');
    return;
  }
  const isVideo = file.type.startsWith('video/');
  const maxSize = isVideo ? 50 * 1024 * 1024 : 8 * 1024 * 1024;
  if(file.size > maxSize){
    errEl.textContent = isVideo ? 'Видео слишком большое (максимум 50 МБ)' : 'Файл слишком большой (максимум 8 МБ)';
    errEl.classList.add('show');
    return;
  }
  if(containsBannedWords(cap)){
    errEl.textContent = 'В описании есть недопустимые слова, перепишите его';
    errEl.classList.add('show');
    return;
  }

  const btn = $('postSubmit');
  btn.disabled = true;

  if(!isVideo){
    btn.innerHTML = '<span class="spinner"></span> проверка...';
    const safe = await isImageSafe(file);
    if(!safe){
      errEl.textContent = 'Это фото не подходит для публикации';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Опубликовать';
      return;
    }
  }
  btn.innerHTML = '<span class="spinner"></span>';

  const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
  const filePath = `${currentUser.username}/${Date.now()}-${safeName}`;

  const { error: uploadError } = await sb.storage.from('post-images').upload(filePath, file);
  if(uploadError){
    console.error(uploadError);
    errEl.textContent = 'Не получилось загрузить файл, попробуйте ещё раз';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Опубликовать';
    return;
  }

  const { data: urlData } = sb.storage.from('post-images').getPublicUrl(filePath);
  const img = urlData.publicUrl;

  const ok = await insertPost(currentUser.username, img, cap, isVideo ? 'video' : 'image');
  if(ok){
    await loadPosts();
    await loadAvatarsForUsers(postsCache.map(p => p.author));
    await loadCommentCounts(postsCache.map(p => p.id));
    lastFeedSignature = computeFeedSignature(postsCache);
  }

  btn.disabled = false;
  btn.textContent = 'Опубликовать';

  if(ok){
    clearDropZoneFile(); $('postCap').value = '';
    closeOverlay('postOverlay');
    renderFeed();
    showToast('Пост опубликован');
  } else {
    errEl.textContent = 'Не получилось опубликовать, попробуйте ещё раз';
    errEl.classList.add('show');
  }
});

/* ===================== Profile ===================== */
function pluralPosts(n){
  const mod10 = n % 10, mod100 = n % 100;
  if(mod10 === 1 && mod100 !== 11) return 'публикация';
  if([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'публикации';
  return 'публикаций';
}

async function openProfileModal(username){

  $('avatarEditBtn').classList.toggle('show', isMe);

  $('profileDisplayName').textContent = displayNameFor(username);

  $('nameEditBtn').onclick = () => {
    $('profileDisplayName').style.display = 'none';
    $('nameEditBtn').style.display = 'none';
    const input = $('nameEditInput');
    input.style.display = 'block';
    input.value = displayNameByUsername[username] || username;
    $('nameEditActions').style.display = 'flex';
    input.focus();
  };
  $('nameCancelBtn').onclick = () => resetNameEditUI(username);
  $('nameSaveBtn').onclick = async () => {
    const newName = $('nameEditInput').value.trim();
    if(!newName){ showToast('Имя не может быть пустым'); return; }
    if(containsBannedWords(newName)){ showToast('В имени есть недопустимые слова'); return; }
    await sb.from('users').update({ display_name: newName }).eq('username', currentUser.username);
    displayNameByUsername[username] = newName;
    resetNameEditUI(username);
    renderFeed();
    showToast('Имя обновлено');
  };

  const bio = bioByUsername[username];
  $('profileBioText').textContent = bio || (isMe ? 'Пока нет описания.' : '');
  resetBioEditUI();
  const bioEditBtn = $('profileBioEditBtn');
  bioEditBtn.style.display = isMe ? 'inline-block' : 'none';
  bioEditBtn.onclick = () => {
    $('profileBioText').style.display = 'none';
    bioEditBtn.style.display = 'none';
    const textarea = $('bioEditInput');
    textarea.style.display = 'block';
    textarea.value = bioByUsername[username] || '';
    $('bioEditActions').style.display = 'flex';
    textarea.focus();
  };
  $('bioCancelBtn').onclick = () => resetBioEditUI(username);
  $('bioSaveBtn').onclick = async () => {
    const newBio = $('bioEditInput').value.trim();
    if(containsBannedWords(newBio)){ showToast('В описании есть недопустимые слова'); return; }
    await sb.from('users').update({ bio: newBio }).eq('username', currentUser.username);
    bioByUsername[username] = newBio;
    resetBioEditUI(username);
    showToast('Описание обновлено');
  };

  const userPosts = postsCache.filter(p => p.author === username).sort((a,b) => b.ts - a.ts);
  $('profilePostCount').textContent = `${userPosts.length} ${pluralPosts(userPosts.length)}`;

  const actions = $('profileActions');
  if(isMe){
    const isPrivate = !!isPrivateByUsername[username];
    actions.innerHTML = `
      <div class="privacy-toggle-row">
        <span>${isPrivate ? 'Закрытый аккаунт' : 'Открытый аккаунт'}</span>
        <label class="privacy-switch">
          <input type="checkbox" id="privacyToggle" ${isPrivate ? 'checked' : ''}>
          <span class="privacy-switch-slider"></span>
        </label>
      </div>
      <p style="font-size:11.5px; color:var(--fg-dim); margin:-4px 0 14px;">
        ${isPrivate ? 'Ваши публикации в разделе «Мир» видят только друзья.' : 'Ваши публикации в разделе «Мир» видят все.'}
      </p>
      <div style="display:flex; gap:8px;">
        <button class="btn-ghost" id="profileSettingsBtn" style="flex:1;">⚙ Настройки</button>
        <button class="btn-ghost" id="profileLogoutBtn" style="flex:1;">Выйти</button>
      </div>
    `;
    $('privacyToggle').addEventListener('change', async (e) => {
      const newValue = e.target.checked;
      await sb.from('users').update({ is_private: newValue }).eq('username', username);
      isPrivateByUsername[username] = newValue;
      lastFeedSignature = '';
      renderFeed();
      openProfileModal(username);
    });
    $('profileSettingsBtn').addEventListener('click', () => { closeOverlay('profileOverlay'); openSettingsModal(); });
    $('profileLogoutBtn').addEventListener('click', () => { closeOverlay('profileOverlay'); logout(); });
  } else {
    const status = await getFriendStatus(currentUser.username, username);

    if(status && status.status === 'blocked' && status.requester === username){
      actions.innerHTML = `<div class="empty-state" style="padding:14px; font-size:12.5px;">Этот пользователь ограничил вам доступ.</div>`;
    } else if(status && status.status === 'blocked' && status.requester === currentUser.username){
      actions.innerHTML = `<button class="btn-ghost" id="unblockBtn" style="width:100%;">Разблокировать</button>`;
      $('unblockBtn').addEventListener('click', async () => {
        await unblockUser(currentUser.username, username);
        await refreshBlockedSet();
        showToast('Пользователь разблокирован');
        openProfileModal(username);
      });
    } else {
      let friendBtnHtml = `<button class="btn-ghost" id="profileFriendBtn">+ Добавить в друзья</button>`;
      let showUnfriend = false;
      if(status){
        if(status.status === 'accepted'){ friendBtnHtml = `<span class="btn-ghost" style="cursor:default;">Друзья ✓</span>`; showUnfriend = true; }
        else if(status.status === 'pending' && status.requester === currentUser.username) friendBtnHtml = `<span class="btn-ghost" style="cursor:default;">Заявка отправлена</span>`;
        else if(status.status === 'pending') friendBtnHtml = `<button class="btn-ghost" id="profileFriendBtn">Принять заявку</button>`;
      }
      actions.innerHTML = `
        <div style="display:flex; gap:8px; margin-bottom:8px;">
          <button class="btn-primary" id="profileMsgBtn" style="flex:1;">Написать</button>
          ${friendBtnHtml}
        </div>
        <div style="display:flex; gap:8px;">
          ${showUnfriend ? `<button class="row-btn" id="unfriendBtn" style="flex:1;">Убрать из друзей</button>` : ''}
          <button class="row-btn" id="blockBtn" style="flex:1; color:var(--accent); border-color:var(--accent);">Заблокировать</button>
        </div>
      `;
      $('profileMsgBtn').addEventListener('click', () => {
        closeOverlay('profileOverlay');
        openChat(username);
      });
      const friendBtn = $('profileFriendBtn');
      if(friendBtn){
        friendBtn.addEventListener('click', async () => {
          if(!status){
            await sendFriendRequest(currentUser.username, username);
            showToast('Заявка отправлена');
          } else if(status.status === 'pending' && status.requester !== currentUser.username){
            await respondFriendRequest(status.id, 'accepted');
            showToast('Заявка принята');
          }
          openProfileModal(username);
        });
      }
      const unfriendBtn = $('unfriendBtn');
      if(unfriendBtn){
        unfriendBtn.addEventListener('click', async () => {
          const ok = await showConfirm(`Убрать ${displayNameFor(username)} из друзей?`, 'Убрать');
          if(ok){
            await removeFriendship(currentUser.username, username);
            await refreshMyFriendsSet();
            showToast('Удалено из друзей');
            lastFeedSignature = '';
            renderFeed();
            openProfileModal(username);
          }
        });
      }
      $('blockBtn').addEventListener('click', async () => {
        const ok = await showConfirm(`Заблокировать ${displayNameFor(username)}? Вы перестанете видеть публикации друг друга.`, 'Заблокировать');
        if(ok){
          await blockUser(currentUser.username, username);
          await refreshMyFriendsSet();
          await refreshBlockedSet();
          showToast('Пользователь заблокирован');
          closeOverlay('profileOverlay');
          lastFeedSignature = '';
          renderFeed();
        }
      });
    }
  }

  const grid = $('profilePosts');
  if(userPosts.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Пока нет публикаций.</div>`;
  } else {
    grid.innerHTML = userPosts.map(p => p.mediaType === 'video'
      ? `<video src="${p.img}" muted loop playsinline preload="metadata"></video>`
      : `<img src="${p.img}" loading="lazy" alt="${escapeHtml(p.cap)}">`
    ).join('');
  }

  openOverlay('profileOverlay');
}

$('avatarFileInput').addEventListener('change', async () => {

  if(!file) return;
  const editBtn = $('avatarEditBtn');
  const originalIcon = editBtn.textContent;
  editBtn.innerHTML = '<span class="spinner" style="width:10px;height:10px;border-width:1.5px;"></span>';

  const safe = await isImageSafe(file);
  if(!safe){
    showToast('Это фото не подходит для аватара');
    editBtn.textContent = originalIcon;
    $('avatarFileInput').value = '';
    return;
  }

  const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');

  const { error: uploadError } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
  if(uploadError){
    console.error(uploadError);
    showToast('Не получилось загрузить фото');
    editBtn.textContent = originalIcon;
    $('avatarFileInput').value = '';
    return;
  }

  const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);

  if(oldAvatarUrl){
    const oldPath = extractStoragePath(oldAvatarUrl, 'avatars');
    if(oldPath){
      const { error: removeError } = await sb.storage.from('avatars').remove([oldPath]);
      if(removeError) console.error('Не удалось удалить старый аватар', removeError);
    }
  }

  $('profileAvatar').innerHTML = avatarInnerHtml(currentUser.username);
  renderBottomNav();
  editBtn.textContent = originalIcon;
  $('avatarFileInput').value = '';
  renderFeed();
  showToast('Аватар обновлён');
});

async function runUserSearch(query){
  const allUsersList = $('allUsersList');
  if(!query){
    allUsersList.innerHTML = `<div class="empty-state" style="padding:16px; font-size:12px;">Начните вводить имя</div>`;
    return;
  }
  const { data, error } = await sb.from('users')
    .select('username, display_name')
    .neq('username', currentUser.username)
    .or(`username.ilike.%${query}%,display_name.ilike.%${query}%`)
    .limit(20);
  if(error){ console.error(error); return; }
  const results = data.map(u => u.username).filter(u => !blockedUsernames.has(u));
  results.forEach(u => { if(!displayNameByUsername[u]) displayNameByUsername[u] = data.find(d => d.username === u).display_name; });
  await loadAvatarsForUsers(results);

  if(results.length === 0){
    allUsersList.innerHTML = `<div class="empty-state" style="padding:16px; font-size:12px;">Никого не нашлось</div>`;
    return;
  }
  allUsersList.innerHTML = results.map(u => `<div class="user-row" data-username="${u}"><span>${escapeHtml(displayNameFor(u))}</span><span class="friend-slot" data-slot="${u}">...</span></div>`).join('');
  for(const u of results){
    const status = await getFriendStatus(currentUser.username, u);
    const slot = allUsersList.querySelector(`[data-slot="${u}"]`);
    if(!slot) continue;
    if(!status){
      slot.innerHTML = `<button class="row-btn" data-request="${u}">+ Добавить</button>`;
    } else if(status.status === 'accepted'){
      slot.innerHTML = `<span style="color:var(--fg-dim); font-size:11.5px;">Друзья ✓</span>`;
    } else if(status.status === 'pending' && status.requester === currentUser.username){
      slot.innerHTML = `<span style="color:var(--fg-dim); font-size:11.5px;">Заявка отправлена</span>`;
    } else if(status.status === 'pending'){
      slot.innerHTML = `<span style="color:var(--fg-dim); font-size:11.5px;">Ждёт вашего ответа</span>`;
    } else {
      slot.innerHTML = `<button class="row-btn" data-request="${u}">+ Добавить</button>`;
    }
  }
  allUsersList.querySelectorAll('[data-request]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await sendFriendRequest(currentUser.username, btn.dataset.request);
      showToast('Заявка отправлена');
      runUserSearch($('userSearchInput').value.trim());
    });
  });
  allUsersList.querySelectorAll('.user-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if(e.target.closest('[data-request]')) return;
      $('searchPanel').classList.remove('open');
      openProfileModal(row.dataset.username);
    });
  });
}

let searchDebounceTimer = null;
$('userSearchInput').addEventListener('input', () => {
  const query = $('userSearchInput').value.trim();
  $('searchClearBtn').style.display = query ? 'flex' : 'none';
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => runUserSearch(query), 250);

/* ===================== Comments UI ===================== */
let activeCommentsPostId = null;
async function openComments(postId){
  activeCommentsPostId = postId;
  await renderComments();
  openOverlay('commentsOverlay');
}
async function renderComments(){
  const comments = await fetchComments(activeCommentsPostId);
  const el = $('commentsList');
  if(comments.length === 0){
    el.innerHTML = `<div class="empty-state" style="padding:20px;">Пока нет комментариев.<br>Будьте первым.</div>`;
    return;
  }
  el.innerHTML = comments.map(c => `
    <div class="msg theirs" style="align-self:flex-start; max-width:88%;">
      <strong style="font-size:12px;">${escapeHtml(displayNameFor(c.author))}</strong><br>
      ${escapeHtml(c.text)}
      <div class="msg-time">${new Date(c.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}
$('commentSend').addEventListener('click', sendComment);
$('commentInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') sendComment(); });
async function sendComment(){
  const input = $('commentInput');
  const text = input.value.trim();
  if(!text || !activeCommentsPostId) return;
  if(containsBannedWords(text)){ showToast('Комментарий содержит недопустимые слова'); return; }
  input.value = '';
  await insertComment(activeCommentsPostId, currentUser.username, text);
  await renderComments();
  commentCountsByPost[activeCommentsPostId] = (commentCountsByPost[activeCommentsPostId] || 0) + 1;
  renderFeed();
}

async function openChat(withUser){
  dmWithUser = withUser;
  await getAvatarUrl(withUser);
  $('chatWithName').textContent = displayNameFor(withUser);
  closeOverlay('dmListOverlay');
  openOverlay('chatOverlay');
  $('emojiPanel').classList.remove('open');
  await renderChatMessages();

  await refreshBadges();

}

async function renderChatMessages(){
  const messages = await loadThread(currentUser.username, dmWithUser);
  const el = $('chatMessages');
  el.innerHTML = messages.map(m => `
    <div class="msg ${m.from === currentUser.username ? 'mine' : 'theirs'}">
      ${escapeHtml(m.text)}
      <div class="msg-time">${new Date(m.ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</div>

$('chatSend').addEventListener('click', sendChatMessage);
$('chatInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') sendChatMessage(); });

async function sendChatMessage(){
  const input = $('chatInput');

/* ===================== Swipe (Tinder-style) ===================== */
let swipeQueue = [];
let swipeIndex = 0;
let swipeDragState = { card: null, startX: 0, currentX: 0, dragging: false, post: null };

function buildSwipeQueue(){
  swipeQueue = postsCache
    .filter(p => p.author !== currentUser.username)
    .map(p => p)
    .sort(() => Math.random() - 0.5);
  swipeIndex = 0;
}

async function openSwipeModal(){
  buildSwipeQueue();
  await loadAvatarsForUsers(swipeQueue.map(p => p.author));
  renderSwipeCard();
  openOverlay('swipeOverlay');
}

function renderSwipeCard(){
  const stack = $('swipeStack');
  if(swipeIndex >= swipeQueue.length){
    swipeDragState.card = null;
    stack.innerHTML = `<div class="empty-state" style="height:100%; display:flex; align-items:center; justify-content:center;">Пока это всё!<br>Новые посты появятся позже.</div>`;
    return;
  }
  const post = swipeQueue[swipeIndex];
  const mediaHtml = post.mediaType === 'video'
    ? `<video src="${post.img}" autoplay muted loop playsinline style="pointer-events:none;"></video>`
    : `<img src="${post.img}" alt="" style="pointer-events:none;">`;
  stack.innerHTML = `
    <div class="swipe-card" id="swipeCard">
      ${mediaHtml}
      <div class="swipe-stamp swipe-like">Нравится</div>
      <div class="swipe-stamp swipe-nope">Мимо</div>
      <div class="swipe-caption">
        <strong>${escapeHtml(displayNameFor(post.author))}</strong>
        <p>${escapeHtml(post.cap)}</p>
      </div>
    </div>
  `;
  swipeDragState.card = $('swipeCard');
  swipeDragState.post = post;
  swipeDragState.currentX = 0;
}

function swipeGetX(e){
  return e.touches ? e.touches[0].clientX : e.clientX;
}
window.addEventListener('mousedown', (e) => { if(e.target.closest('#swipeCard')) swipeStartDrag(e); });
window.addEventListener('touchstart', (e) => { if(e.target.closest('#swipeCard')) swipeStartDrag(e); }, { passive: true });
window.addEventListener('mousemove', swipeMoveDrag);
window.addEventListener('touchmove', swipeMoveDrag);
window.addEventListener('mouseup', swipeEndDrag);
window.addEventListener('touchend', swipeEndDrag);

function swipeStartDrag(e){
  if(!swipeDragState.card) return;
  swipeDragState.dragging = true;
  swipeDragState.startX = swipeGetX(e);
  swipeDragState.card.style.transition = 'none';
}
function swipeMoveDrag(e){
  if(!swipeDragState.dragging || !swipeDragState.card) return;
  const x = swipeGetX(e) - swipeDragState.startX;
  swipeDragState.currentX = x;
  swipeDragState.card.style.transform = `translateX(${x}px) rotate(${x / 14}deg)`;
  const likeStamp = swipeDragState.card.querySelector('.swipe-like');
  const nopeStamp = swipeDragState.card.querySelector('.swipe-nope');
  if(likeStamp) likeStamp.style.opacity = x > 25 ? Math.min(x / 100, 1) : 0;
  if(nopeStamp) nopeStamp.style.opacity = x < -25 ? Math.min(-x / 100, 1) : 0;
}
function swipeEndDrag(){
  if(!swipeDragState.dragging || !swipeDragState.card) return;
  swipeDragState.dragging = false;
  const card = swipeDragState.card;
  const x = swipeDragState.currentX;
  card.style.transition = 'transform .3s ease';
  if(x > 110){
    card.style.transform = 'translateX(650px) rotate(24deg)';
    handleSwipeResult(swipeDragState.post, 'like');
  } else if(x < -110){
    card.style.transform = 'translateX(-650px) rotate(-24deg)';
    handleSwipeResult(swipeDragState.post, 'nope');
  } else {
    card.style.transform = '';
  }
}

async function handleSwipeResult(post, action){
  swipeDragState.card = null;
  if(action === 'like' && currentUser){
    post.likedBy = post.likedBy || [];
    if(!post.likedBy.includes(currentUser.username)){
      post.likedBy.push(currentUser.username);
      await updatePostReactions(post.id, post.likedBy, post.repostedBy);
      lastFeedSignature = computeFeedSignature(postsCache);
    }
  }
  setTimeout(() => {
    swipeIndex++;
    renderSwipeCard();
  }, 260);
}

$('swipeLikeBtn').addEventListener('click', () => {
  if(!swipeDragState.card) return;
  swipeDragState.card.style.transition = 'transform .3s ease';
  swipeDragState.card.style.transform = 'translateX(650px) rotate(24deg)';
  handleSwipeResult(swipeDragState.post, 'like');
});
$('swipeNopeBtn').addEventListener('click', () => {
  if(!swipeDragState.card) return;
  swipeDragState.card.style.transition = 'transform .3s ease';
  swipeDragState.card.style.transform = 'translateX(-650px) rotate(-24deg)';
  handleSwipeResult(swipeDragState.post, 'nope');
});

/* ===================== Init ===================== */
let lastFeedSignature = '';

function computeFeedSignature(posts){
  return posts.map(p => `${p.id}:${(p.likedBy||[]).length}:${(p.repostedBy||[]).length}:${p.cap}`).join('|');
}

async function init(){
  $('grid').innerHTML = `<div class="empty-state"><span class="spinner"></span> Загружаю ленту...</div>`;
  const savedUsername = localStorage.getItem('artvane_username');
  if(savedUsername){
    const existing = await findUser(savedUsername);
    if(existing) currentUser = { username: savedUsername, isAdmin: !!existing.is_admin };
    else localStorage.removeItem('artvane_username');
  }
  renderTopBar();
  await refreshMyFriendsSet();
  await refreshBlockedSet();
  await loadPosts();
  await loadAvatarsForUsers(postsCache.map(p => p.author));
  await loadCommentCounts(postsCache.map(p => p.id));
  lastFeedSignature = computeFeedSignature(postsCache);
  renderFeed();
  await refreshBadges();
  feedPollTimer = setInterval(async () => {
    await loadPosts();
    const newSignature = computeFeedSignature(postsCache);
    if(newSignature !== lastFeedSignature){
      lastFeedSignature = newSignature;
      await loadAvatarsForUsers(postsCache.map(p => p.author));
      await loadCommentCounts(postsCache.map(p => p.id));
      renderFeed();
    }
    await refreshBadges();
  }, 15000);
}
initTheme();
init();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed', err));
  });
}

/* ===================== Keyboard-aware layout (mobile) ===================== */
if(window.visualViewport){
  function handleViewportResize(){
    const vv = window.visualViewport;
    const offset = window.innerHeight - vv.height - vv.offsetTop;
    document.documentElement.style.setProperty('--keyboard-offset', offset > 40 ? offset + 'px' : '0px');
  }
  window.visualViewport.addEventListener('resize', handleViewportResize);
  window.visualViewport.addEventListener('scroll', handleViewportResize);
}

document.addEventListener('focusin', (e) => {
  if(e.target.matches('input, textarea')){
    setTimeout(() => {
      e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
});
</script>
